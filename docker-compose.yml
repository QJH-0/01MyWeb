services:
  mysql:
    image: mysql:8.4.8
    container_name: myweb-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: myweb
      MYSQL_USER: myweb
      MYSQL_PASSWORD: myweb
    ports:
      - "3307:3306"
    volumes:
      - myweb_mysql_data:/var/lib/mysql

  redis:
    image: redis:8.6.1-alpine
    container_name: myweb-redis
    ports:
      - "6379:6379"
    volumes:
      - myweb_redis_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.13
    container_name: myweb-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - myweb_es_data:/usr/share/elasticsearch/data

  minio:
    image: minio/minio:latest
    container_name: myweb-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - myweb_minio_data:/data

  nginx:
    image: nginx:1.28.2-alpine
    container_name: myweb-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - elasticsearch
      - minio

volumes:
  myweb_mysql_data:
  myweb_redis_data:
  myweb_es_data:
  myweb_minio_data:

