spring:
  application:
    name: backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: 8080

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} traceId=%X{traceId} - %msg%n"

app:
  cors:
    allowedOrigins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  elasticsearch:
    baseUrl: ${ES_BASE_URL:http://localhost:9200}
  minio:
    baseUrl: ${MINIO_BASE_URL:http://localhost:9000}

