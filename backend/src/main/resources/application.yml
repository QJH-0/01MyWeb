spring:
  application:
    name: myweb-backend
  profiles:
    default: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  sql:
    init:
      mode: never
  flyway:
    enabled: true

server:
  port: 8080

app:
  storage:
    # 为空时由上传请求动态拼接（scheme+host+port），用于生成可粘贴的 accessUrl。
    public-api-base-url: ${APP_PUBLIC_API_BASE_URL:}
    max-file-size-bytes: ${FILE_MAX_SIZE_BYTES:10485760}
    physical-delete-after-soft-delete: ${FILE_PHYSICAL_DELETE:false}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:myweb-files}
      region: ${MINIO_REGION:}
  cors:
    # 含 127.0.0.1：与 Vite 常用 `localhost` / `127.0.0.1` 两种访问方式一致，避免浏览器 Origin 不符报 Invalid CORS request。
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  security:
    jwt:
      secret: ${APP_JWT_SECRET:myweb-dev-jwt-secret-change-this-to-a-long-random-value}
      access-token-ttl-seconds: ${APP_JWT_ACCESS_TTL_SECONDS:86400}
      refresh-token-ttl-seconds: ${APP_JWT_REFRESH_TTL_SECONDS:604800}
    captcha:
      required: ${APP_CAPTCHA_REQUIRED:true}
      min-token-length: ${APP_CAPTCHA_MIN_TOKEN_LENGTH:6}
    register:
      ip-limit-per-minute: ${APP_REGISTER_IP_LIMIT_PER_MINUTE:5}
    login:
      ip-limit-per-minute: ${APP_LOGIN_IP_LIMIT_PER_MINUTE:20}
    admin:
      token: ${APP_ADMIN_TOKEN:myweb-dev-admin-token-change-this}
      bootstrap-username: ${APP_ADMIN_BOOTSTRAP_USERNAME:}
      bootstrap-password: ${APP_ADMIN_BOOTSTRAP_PASSWORD:}
  probes:
    mysql:
      host: ${MYSQL_PROBE_HOST:localhost}
      port: ${MYSQL_PROBE_PORT:3306}
    redis:
      host: ${REDIS_PROBE_HOST:localhost}
      port: ${REDIS_PROBE_PORT:6379}
    elasticsearch:
      host: ${ES_PROBE_HOST:localhost}
      port: ${ES_PROBE_PORT:9200}
    minio:
      host: ${MINIO_PROBE_HOST:localhost}
      port: ${MINIO_PROBE_PORT:9000}
    connect-timeout-ms: ${PROBE_CONNECT_TIMEOUT_MS:800}
    read-timeout-ms: ${PROBE_READ_TIMEOUT_MS:1200}
  search:
    index-name: ${SEARCH_INDEX_NAME:myweb_content}
    elasticsearch:
      enabled: ${SEARCH_ES_ENABLED:true}
      host: ${ES_HOST:localhost}
      port: ${ES_PORT:9200}
    outbox:
      scheduler-enabled: ${SEARCH_OUTBOX_SCHEDULER_ENABLED:true}
      poll-ms: ${SEARCH_OUTBOX_POLL_MS:5000}
      batch-size: ${SEARCH_OUTBOX_BATCH_SIZE:50}
