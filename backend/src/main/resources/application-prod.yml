spring:
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

server:
  forward-headers-strategy: framework

app:
  security:
    admin-token: ${APP_ADMIN_TOKEN}
    rate-limit-per-minute: ${APP_RATE_LIMIT_PER_MINUTE:60}
  storage:
    local-dir: ${APP_STORAGE_DIR:/data/uploads}
