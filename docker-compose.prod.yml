services:
  app:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_URL: jdbc:mysql://mysql:3306/myweb?useSSL=true&requireSSL=true&serverTimezone=Asia/Shanghai
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_ADMIN_TOKEN: ${APP_ADMIN_TOKEN}
      APP_RATE_LIMIT_PER_MINUTE: 60
      APP_STORAGE_DIR: /data/uploads
    volumes:
      - app_uploads:/data/uploads
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.4.8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: myweb
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: ["mysqld", "--require_secure_transport=ON"]
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:8.6.1-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:1.28.2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - app

volumes:
  mysql_data:
  redis_data:
  app_uploads:
